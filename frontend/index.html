<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rate Limiter Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d12;
    --panel: #11161d;
    --panel-hover: #141a22;
    --panel-border: #1e2833;
    --grid-line: #131a22;
    --text-main: #e4ecf3;
    --text-dim: #5c7385;
    --text-faint: #3d4d5c;
    --amber: #ffb454;
    --green: #4fd48a;
    --red: #ff5c5c;
    --cyan: #4fc3f7;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 36px 36px;
    color: var(--text-main);
    font-family: var(--sans);
    padding: 32px 24px 60px;
    min-height: 100vh;
  }

  .container { max-width: 1120px; margin: 0 auto; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .brand-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--cyan), #2a7fb8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 0 24px rgba(79, 195, 247, 0.25);
  }

  .brand h1 {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.01em;
    margin: 0;
    line-height: 1.2;
  }

  .brand .tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    display: block;
    margin-top: 2px;
  }

  .conn-status {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    padding: 7px 14px;
    border-radius: 20px;
  }

  .pulse-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 rgba(79, 212, 138, 0.6);
    animation: pulse-ring 2s infinite;
  }
  .pulse-dot.off { background: var(--red); animation: none; }

  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(79, 212, 138, 0.5); }
    70% { box-shadow: 0 0 0 6px rgba(79, 212, 138, 0); }
    100% { box-shadow: 0 0 0 0 rgba(79, 212, 138, 0); }
  }

  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .summary-card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .summary-card .label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .summary-card .value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 700;
    margin-top: 4px;
  }

  .summary-card .value.allowed { color: var(--green); }
  .summary-card .value.blocked { color: var(--red); }
  .summary-card .value.cyan { color: var(--cyan); }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 22px;
  }

  input#newClientId {
    flex: 1;
    max-width: 300px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--text-main);
    font-family: var(--mono);
    font-size: 13px;
    padding: 11px 14px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }
  input#newClientId:focus { border-color: var(--cyan); }
  input#newClientId::placeholder { color: var(--text-faint); }

  .btn {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.02em;
    border: 1px solid var(--panel-border);
    background: var(--panel);
    color: var(--text-main);
    padding: 11px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.15s;
  }
  .btn:hover { border-color: var(--cyan); background: var(--panel-hover); }
  .btn-primary { background: var(--cyan); color: #06131c; border-color: var(--cyan); }
  .btn-primary:hover { background: #6fd0ff; }

  .section-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 12px 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 10px;
    padding: 18px 18px 14px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.25s, transform 0.15s;
  }
  .card:hover { transform: translateY(-1px); }
  .card.state-blocked { border-color: rgba(255, 92, 92, 0.45); }
  .card.state-allowed { border-color: rgba(79, 212, 138, 0.35); }

  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--text-faint);
    opacity: 0.3;
  }
  .card.state-allowed::before { background: var(--green); opacity: 0.6; }
  .card.state-blocked::before { background: var(--red); opacity: 0.7; }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .client-id {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .client-id .arrow { color: var(--text-faint); }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .badge.idle { background: rgba(92, 115, 133, 0.15); color: var(--text-dim); }
  .badge.allowed { background: rgba(79, 212, 138, 0.15); color: var(--green); }
  .badge.blocked { background: rgba(255, 92, 92, 0.15); color: var(--red); }

  .metric-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .metric-row .value {
    color: var(--text-main);
    font-size: 13px;
    font-weight: 600;
  }

  .bar-track {
    height: 6px;
    background: rgba(255,255,255,0.06);
    border-radius: 3px;
    overflow: hidden;
    margin: 10px 0 16px;
  }
  .bar-fill {
    height: 100%;
    background: var(--green);
    width: 0%;
    border-radius: 3px;
    transition: width 0.35s ease, background 0.35s ease;
  }
  .bar-fill.warn { background: var(--amber); }
  .bar-fill.danger { background: var(--red); }

  .card-actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .action-btn {
    flex: 1;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 9px 6px;
    border-radius: 6px;
    border: 1px solid var(--panel-border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: 0.15s;
  }
  .action-btn:hover { color: var(--text-main); border-color: var(--cyan); background: rgba(79, 195, 247, 0.06); }
  .action-btn.danger-hover:hover { color: var(--red); border-color: var(--red); background: rgba(255, 92, 92, 0.06); }

  .remove-x {
    font-family: var(--mono);
    color: var(--text-faint);
    cursor: pointer;
    font-size: 15px;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.15s;
  }
  .remove-x:hover { color: var(--red); }

  .card-head-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .log-strip {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-dim);
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--panel-border);
    height: 58px;
    overflow-y: auto;
    line-height: 1.7;
  }
  .log-strip::-webkit-scrollbar { width: 3px; }
  .log-strip::-webkit-scrollbar-thumb { background: var(--panel-border); }
  .log-strip .ok { color: var(--green); }
  .log-strip .bad { color: var(--red); }
  .log-strip .empty-log { color: var(--text-faint); font-style: italic; }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
    border: 1px dashed var(--panel-border);
    border-radius: 10px;
  }
  .empty-state .big { font-size: 28px; margin-bottom: 8px; display: block; }

  footer {
    max-width: 1120px;
    margin: 44px auto 0;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    text-align: center;
    border-top: 1px solid var(--panel-border);
    padding-top: 18px;
  }
  footer span { color: var(--text-dim); }
</style>
</head>
<body>

<div class="container">

  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">🚦</div>
      <div>
        <h1>rate-limiter-console</h1>
        <span class="tag">smart adaptive · token bucket · redis-backed</span>
      </div>
    </div>
    <div class="conn-status">
      <span class="pulse-dot" id="connDot"></span>
      <span id="connText">backend online</span>
    </div>
  </div>

  <div class="summary">
    <div class="summary-card">
      <div class="label">Clients tracked</div>
      <div class="value cyan" id="summaryClients">0</div>
    </div>
    <div class="summary-card">
      <div class="label">Total requests</div>
      <div class="value" id="summaryTotal">0</div>
    </div>
    <div class="summary-card">
      <div class="label">Allowed</div>
      <div class="value allowed" id="summaryAllowed">0</div>
    </div>
    <div class="summary-card">
      <div class="label">Blocked</div>
      <div class="value blocked" id="summaryBlocked">0</div>
    </div>
  </div>

  <div class="controls">
    <input id="newClientId" placeholder="client id, e.g. user-42" onkeydown="if(event.key==='Enter') addClient()" />
    <button class="btn btn-primary" onclick="addClient()">+ Add client</button>
    <button class="btn" onclick="addPreset()">+ Demo clients</button>
  </div>

  <div class="section-label">Active clients</div>
  <div class="grid" id="clientsGrid"></div>
</div>

<footer>
  polling every <span>1s</span> &nbsp;·&nbsp; bucket refills continuously &nbsp;·&nbsp; endpoint <span>smart-rate-limiter-production.up.railway.app</span>
</footer>

<script>
  const API_BASE = 'https://smart-rate-limiter-production-846d.up.railway.app';
  const API_KEY = 'key-abc123'; // backend ke application.properties me set ki hui valid key
  let clients = ['user1', 'user2'];
  let totals = { allowed: 0, blocked: 0 };

  function renderClients() {
    const grid = document.getElementById('clientsGrid');
    document.getElementById('summaryClients').innerText = clients.length;

    if (clients.length === 0) {
      grid.innerHTML = `<div class="empty-state"><span class="big">📭</span>No clients yet.<br>Add one above to start sending requests.</div>`;
      return;
    }
    grid.innerHTML = clients.map(id => `
      <div class="card" id="card-${id}">
        <div class="card-head">
          <span class="client-id"><span class="arrow">▸</span>${id}</span>
          <div class="card-head-right">
            <span class="badge idle" id="badge-${id}">idle</span>
            <span class="remove-x" onclick="removeClient('${id}')" title="Remove client">✕</span>
          </div>
        </div>

        <div class="metric-row">
          <span>requests / limit</span>
          <span class="value" id="count-${id}">0 / --</span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="bar-${id}"></div></div>

        <div class="metric-row">
          <span>tokens left</span>
          <span class="value" id="rate-${id}">0.0</span>
        </div>

        <div class="card-actions">
          <button class="action-btn" onclick="sendRequest('${id}')">Send 1</button>
          <button class="action-btn danger-hover" onclick="spam('${id}')">Burst ×15</button>
        </div>

        <div class="log-strip" id="log-${id}"><span class="empty-log">waiting for activity…</span></div>
      </div>
    `).join('');
  }

  function addClient() {
    const input = document.getElementById('newClientId');
    const id = input.value.trim();
    if (id && !clients.includes(id)) {
      clients.push(id);
      renderClients();
      updateStats(id);
      input.value = '';
    }
    input.focus();
  }

  function addPreset() {
    ['api-key-a1', 'api-key-b2', 'mobile-app'].forEach(id => {
      if (!clients.includes(id)) clients.push(id);
    });
    renderClients();
    clients.forEach(id => updateStats(id));
  }

  function removeClient(id) {
    clients = clients.filter(c => c !== id);
    renderClients();
  }

  function setConnState(ok) {
    document.getElementById('connDot').className = 'pulse-dot' + (ok ? '' : ' off');
    document.getElementById('connText').innerText = ok ? 'backend online' : 'backend unreachable';
  }

  function updateSummary() {
    document.getElementById('summaryAllowed').innerText = totals.allowed;
    document.getElementById('summaryBlocked').innerText = totals.blocked;
    document.getElementById('summaryTotal').innerText = totals.allowed + totals.blocked;
  }

  async function sendRequest(id) {
    try {
      const res = await fetch(`${API_BASE}/api/check?clientId=${encodeURIComponent(id)}`, {
        headers: { 'X-API-Key': API_KEY }
      });
      const data = await res.json();
      setConnState(true);
      updateBadge(id, data.status);
      logEvent(id, data.status);

      if (data.status === 'allowed') totals.allowed++;
      else totals.blocked++;
      updateSummary();

      await updateStats(id);
    } catch (err) {
      setConnState(false);
    }
  }

  async function updateStats(id) {
    try {
      const res = await fetch(`${API_BASE}/api/stats?clientId=${encodeURIComponent(id)}`, {
        headers: { 'X-API-Key': API_KEY }
      });
      const data = await res.json();
      setConnState(true);

      const countEl = document.getElementById(`count-${id}`);
      const barEl = document.getElementById(`bar-${id}`);
      const rateEl = document.getElementById(`rate-${id}`);
      if (!countEl || !barEl || !rateEl) return;

      countEl.innerText = `${data.count} / ${data.limit}`;
      rateEl.innerText = Number(data.avgRate).toFixed(1);

      const pct = Math.min(100, (data.count / data.limit) * 100);
      barEl.style.width = pct + '%';
      barEl.className = 'bar-fill' + (pct >= 100 ? ' danger' : pct >= 70 ? ' warn' : '');
    } catch (err) {
      setConnState(false);
    }
  }

  function updateBadge(id, status) {
    const badge = document.getElementById(`badge-${id}`);
    const card = document.getElementById(`card-${id}`);
    if (!badge || !card) return;
    badge.innerText = status;
    badge.className = 'badge ' + (status === 'allowed' ? 'allowed' : status === 'blocked' ? 'blocked' : 'idle');
    card.className = 'card ' + (status === 'allowed' ? 'state-allowed' : status === 'blocked' ? 'state-blocked' : '');
  }

  function logEvent(id, status) {
    const log = document.getElementById(`log-${id}`);
    if (!log) return;
    const time = new Date().toLocaleTimeString();
    const cls = status === 'allowed' ? 'ok' : 'bad';
    const icon = status === 'allowed' ? '✓' : '✕';
    const entry = `<div class="${cls}">${icon} ${time} — ${status}</div>`;
    if (log.querySelector('.empty-log')) log.innerHTML = entry;
    else log.innerHTML = entry + log.innerHTML;
  }

  async function spam(id) {
    for (let i = 0; i < 15; i++) {
      await sendRequest(id);
      await new Promise(r => setTimeout(r, 150));
    }
  }

  renderClients();
  clients.forEach(id => updateStats(id));

  setInterval(() => {
    clients.forEach(id => updateStats(id));
  }, 1000);
</script>
</body>
</html>
